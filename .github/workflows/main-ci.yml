name: Main CI

on:
  push:
    branches:
      - main

concurrency:
  group: main-ci
  cancel-in-progress: true

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        shell: bash
        run: |
          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [[ "$base" =~ ^0+$ ]]; then
            git diff-tree --no-commit-id --name-only -r "$head" > changed-files.txt
          else
            git diff --name-only "$base" "$head" > changed-files.txt
          fi

          if [ ! -s changed-files.txt ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          while IFS= read -r file; do
            case "$file" in
              *.md|project-docs/*|产品文档/*)
                ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done < changed-files.txt

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  docs-only:
    name: Docs Only
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'

    steps:
      - name: Skip Flutter checks
        run: echo "Docs-only change; Flutter checks skipped."

  check:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check generated files are committed
        run: git diff --exit-code

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  required-check:
    name: Required Check
    runs-on: ubuntu-latest
    needs:
      - changes
      - docs-only
      - check
    if: always()

    steps:
      - name: Validate workflow result
        shell: bash
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection failed."
            exit 1
          fi

          if [ "${{ needs.changes.outputs.docs_only }}" = "true" ]; then
            echo "Docs-only change; required check passed."
            exit 0
          fi

          if [ "${{ needs.check.result }}" != "success" ]; then
            echo "Quality gate failed."
            exit 1
          fi

          echo "Required check passed."

  android-debug-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs:
      - changes
      - required-check
    if: needs.changes.outputs.docs_only != 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: keepday-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
